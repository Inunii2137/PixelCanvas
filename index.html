<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pixel Canvas</title>

    <!-- CONNECT CSS -->

    <link rel="stylesheet" href="style.css">

    <meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=5.0,
               user-scalable=yes">

</head>


<body>

    <!-- TIMER -->

    <div class="timer" id="timer">
        You can place a pixel now!
    </div>

    <!-- MAIN CONTAINER -->

    <div class="container">

    <div class="canvas-wrapper">
        <div id="canvas"></div>
    </div>

    <div class="bottom-panel">

       <div class="color"
     data-color="#01CDFE"
     style="background:#01CDFE"></div>

<div class="color"
     data-color="#B967FF"
     style="background:#B967FF"></div>

<div class="color"
     data-color="#FF71CE"
     style="background:#FF71CE"></div>

<div class="color"
     data-color="#05FFA1"
     style="background:#05FFA1"></div>

<div class="color"
     data-color="#FFFB96"
     style="background:#FFFB96"></div>

<div class="color"
     data-color="#C4C4C4"
     style="background:#C4C4C4"></div>
       
    </div>

        <div class="qr-box">

            <img
                src="qr.png"
                alt="QR Code">

        </div>

    </div>

</div>

            </div>

        </div>

    </div>

    <!-- CONNECT JAVASCRIPT -->

    <script src="script.js"></script>

</body>

</html>
