<html lang="en">

<head>

          content="width=device-width, initial-scale=1.0">

    <title>Pixel Canvas</title>

    <!-- CONNECT CSS -->

    <link rel="stylesheet" href="style.css">

        <div id="canvas"></div>
    </div>

    <div class="colors">

        <div class="color"
             data-color="#330136"
             style="background:#330136"></div>

        <div class="color"
             data-color="#5E1742"
             style="background:#5E1742"></div>

        <div class="color"
             data-color="#962E40"
             style="background:#962E40"></div>

        <div class="color"
             data-color="#C9463D"
             style="background:#C9463D"></div>

        <div class="color"
             data-color="#FF5E35"
             style="background:#FF5E35"></div>

        <div class="color"
             data-color="#ff9a75"
             style="background:#ff9a75"></div>

    </div>

   

        <div class="qr-box">

            <img
                src="qr.png"
                alt="QR Code">
</div>
        


    </div>
