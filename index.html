<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pixel Canvas</title>

    <!-- CONNECT CSS -->

    <link rel="stylesheet" href="style.css">

    <meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=5.0,
               user-scalable=yes">

</head>


<body>

    <!-- TIMER -->

    <div class="timer" id="timer">
        You can place a pixel now!
    </div>

    <!-- MAIN CONTAINER -->

    <div class="container">

    <div class="canvas-wrapper">
        <div id="canvas"></div>
    </div>

    <div class="bottom-panel">

       <div class="color"
     data-color="#3f51ff"
     style="background:#3f51ff"></div>

<div class="color"
     data-color="#ff2ebd"
     style="background:#ff2ebd"></div>

<div class="color"
     data-color="#000000"
     style="background:#000000"></div>

<div class="color"
     data-color="#c8ff2f"
     style="background:#c8ff2f"></div>

<div class="color"
     data-color="#ffffff"
     style="background:#ffffff"></div>

<div class="color"
     data-color="#ff8636"
     style="background:#ff8636"></div>
       
    </div>

        <div class="qr-box">

            <img
                src="qr.png"
                alt="QR Code">

        </div>

    </div>

</div>

            </div>

        </div>

    </div>

    <!-- CONNECT JAVASCRIPT -->

    <script src="script.js"></script>

</body>

</html>
